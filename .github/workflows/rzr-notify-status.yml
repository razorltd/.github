name: RZR Status Notify

on:
  workflow_call:
    inputs:
      current_result:
        description: "Optional current workflow result (e.g., success, failure). If omitted, automatically determined by scanning all jobs in the run."
        required: false
        default: ""
        type: string
      mention_on_failure:
        description: "Optional Slack mention, for example <!subteam^ID> or @here"
        required: false
        default: ""
        type: string
      channel_context:
        description: "Optional human-readable context, for example Workflow run"
        required: false
        default: "Workflow run"
        type: string
      report-mode:
        description: "Notification mode: on-change (default), all, all-failures"
        required: false
        default: "on-change"
        type: string
      slack_channel:
        description: "Slack channel to post to (e.g., #build-status)"
        required: true
        type: string
    secrets:
      slack_bot_token:
        required: true

permissions:
  actions: read
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Determine whether Slack notification is required
        id: decision
        uses: actions/github-script@v8
        env:
          CURRENT_RESULT: ${{ inputs.current_result }}
          REPORT_MODE: ${{ inputs.report-mode }}
          SLACK_BOT_TOKEN: ${{ secrets.slack_bot_token }}
          SLACK_CHANNEL: ${{ inputs.slack_channel }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentResultInput = process.env.CURRENT_RESULT;
            const reportMode = process.env.REPORT_MODE;
            const botToken = process.env.SLACK_BOT_TOKEN;
            const channel = process.env.SLACK_CHANNEL;

            if (!botToken) {
              core.setFailed("Secret 'slack_bot_token' is required.");
              return;
            }
            if (!channel) {
              core.setFailed("Input 'slack_channel' is required.");
              return;
            }

            const validModes = ['on-change', 'all', 'all-failures'];
            if (!validModes.includes(reportMode)) {
              core.setFailed(`Invalid report-mode: ${reportMode}. Must be one of: ${validModes.join(', ')}`);
              return;
            }

            // Always fetch run jobs to analyze results
            const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: context.runId,
              per_page: 100
            });
            const jobs = jobsResponse.data.jobs || [];

            const passedJobs = jobs.filter(j => j.conclusion === 'success').map(j => j.name);
            const failedJobs = jobs.filter(j => j.conclusion === 'failure' || j.conclusion === 'timed_out').map(j => j.name);
            const skippedJobs = jobs.filter(j => j.conclusion === 'skipped').map(j => j.name);
            const cancelledJobs = jobs.filter(j => j.conclusion === 'cancelled').map(j => j.name);

            let currentResult = currentResultInput;
            if (!currentResult) {
              currentResult = failedJobs.length > 0 ? 'failure' : 'success';
            } else {
              const validResults = ['success', 'failure', 'cancelled', 'skipped'];
              if (!validResults.includes(currentResult)) {
                core.setFailed(`Invalid current_result: ${currentResult}. Must be one of: ${validResults.join(', ')}`);
                return;
              }
            }

            const currentRun = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id: context.runId
            });
            const workflowId = currentRun.data.workflow_id;

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowId,
              status: 'completed',
              per_page: 10
            });

            const currentRunId = context.runId;

            const previousRun = runs.data.workflow_runs.find(r => r.id !== currentRunId);
            const previousConclusion = previousRun?.conclusion || 'unknown';

            let notificationType = 'none';
            let statusText = 'recovered';
            let reasoning = '';

            if (currentResult === 'failure') {
              if (reportMode === 'all') {
                notificationType = 'failure';
                reasoning = `Current run failed. Mode is 'all', so notification is triggered.`;
              } else if (reportMode === 'all-failures') {
                notificationType = 'failure';
                reasoning = `Current run failed. Mode is 'all-failures', so notification is triggered.`;
              } else if (reportMode === 'on-change') {
                if (previousConclusion !== 'failure') {
                  notificationType = 'failure';
                  reasoning = `Current run failed, while previous run conclusion was '${previousConclusion}' (state changed to failure). Notification is triggered.`;
                } else {
                  reasoning = `Current run failed, and previous run conclusion was also '${previousConclusion}'. Mode is 'on-change', suppressing duplicate failure notification.`;
                }
              }
            } else if (currentResult === 'success') {
              if (reportMode === 'all') {
                notificationType = 'recovery';
                statusText = previousConclusion === 'failure' ? 'recovered' : 'succeeded';
                reasoning = `Current run succeeded. Previous run conclusion was '${previousConclusion}'. Mode is 'all', so notification is triggered.`;
              } else if (reportMode === 'on-change' || reportMode === 'all-failures') {
                if (previousConclusion === 'failure') {
                  notificationType = 'recovery';
                  reasoning = `Current run succeeded, while previous run failed. Build has recovered. Notification is triggered.`;
                } else {
                  reasoning = `Current run succeeded and previous run conclusion was '${previousConclusion}'. State did not transition from failure. Notification is suppressed.`;
                }
              }
            }

            let meaning = '';
            if (previousConclusion === 'failure') {
              if (currentResult === 'success') {
                meaning = 'Build recovered! The previous failure has been resolved.';
              } else {
                meaning = 'Build is still failing. Attention is required to fix the broken jobs.';
              }
            } else {
              if (currentResult === 'failure') {
                meaning = 'Build broke! A new failure was introduced. Please investigate.';
              } else {
                meaning = 'Build is healthy and continues to pass.';
              }
            }

            let jobSummary = `Passed: ${passedJobs.length} | Failed: ${failedJobs.length} | Skipped: ${skippedJobs.length}`;
            if (failedJobs.length > 0) {
              jobSummary += ` (Failed: ${failedJobs.join(', ')})`;
            }
            if (skippedJobs.length > 0) {
              jobSummary += ` (Skipped: ${skippedJobs.join(', ')})`;
            }

            core.info(`Notification Type: ${notificationType}`);
            core.info(`Status Text: ${statusText}`);
            core.info(`Previous Conclusion: ${previousConclusion}`);
            core.info(`Reasoning: ${reasoning}`);
            core.info(`Job Summary: ${jobSummary}`);
            core.info(`Meaning: ${meaning}`);

            core.setOutput('notification_type', notificationType);
            core.setOutput('status_text', statusText);
            core.setOutput('previous_conclusion', previousConclusion);
            core.setOutput('reasoning', reasoning);
            core.setOutput('job_summary', jobSummary);
            core.setOutput('meaning', meaning);

      - name: Send Slack failure notification
        if: steps.decision.outputs.notification_type == 'failure'
        shell: bash
        env:
          SLACK_BOT_TOKEN: ${{ secrets.slack_bot_token }}
          SLACK_CHANNEL: ${{ inputs.slack_channel }}
          MENTION: ${{ inputs.mention_on_failure }}
          CHANNEL_CONTEXT: ${{ inputs.channel_context }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REASONING: ${{ steps.decision.outputs.reasoning }}
          JOB_SUMMARY: ${{ steps.decision.outputs.job_summary }}
          MEANING: ${{ steps.decision.outputs.meaning }}
          PREVIOUS_CONCLUSION: ${{ steps.decision.outputs.previous_conclusion }}
        run: |
          NL=$'\n'
          payload=$(jq -n \
            --arg channel "$SLACK_CHANNEL" \
            --arg text "❌ ${CHANNEL_CONTEXT} failed${NL}${MENTION}${NL}Repository: ${REPOSITORY}${NL}Workflow: ${WORKFLOW_NAME}${NL}Run: ${RUN_URL}${NL}Previous State: ${PREVIOUS_CONCLUSION}${NL}Job Summary: ${JOB_SUMMARY}${NL}Reasoning: ${REASONING}${NL}What this means: ${MEANING}" \
            '{channel: $channel, text: $text}')
          
          response=$(curl -sS -X POST \
            -H 'Content-type: application/json; charset=utf-8' \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            --data "$payload" \
            "https://slack.com/api/chat.postMessage")
          
          echo "Slack response: $response"
          if [ "$(echo "$response" | jq -r '.ok')" != "true" ]; then
            echo "Error: Slack API call failed!" >&2
            exit 1
          fi

      - name: Send Slack recovery notification
        if: steps.decision.outputs.notification_type == 'recovery'
        shell: bash
        env:
          SLACK_BOT_TOKEN: ${{ secrets.slack_bot_token }}
          SLACK_CHANNEL: ${{ inputs.slack_channel }}
          CHANNEL_CONTEXT: ${{ inputs.channel_context }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS_TEXT: ${{ steps.decision.outputs.status_text }}
          REASONING: ${{ steps.decision.outputs.reasoning }}
          JOB_SUMMARY: ${{ steps.decision.outputs.job_summary }}
          MEANING: ${{ steps.decision.outputs.meaning }}
          PREVIOUS_CONCLUSION: ${{ steps.decision.outputs.previous_conclusion }}
        run: |
          NL=$'\n'
          payload=$(jq -n \
            --arg channel "$SLACK_CHANNEL" \
            --arg text "✅ ${CHANNEL_CONTEXT} ${STATUS_TEXT}${NL}Repository: ${REPOSITORY}${NL}Workflow: ${WORKFLOW_NAME}${NL}Run: ${RUN_URL}${NL}Previous State: ${PREVIOUS_CONCLUSION}${NL}Job Summary: ${JOB_SUMMARY}${NL}Reasoning: ${REASONING}${NL}What this means: ${MEANING}" \
            '{channel: $channel, text: $text}')
          
          response=$(curl -sS -X POST \
            -H 'Content-type: application/json; charset=utf-8' \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            --data "$payload" \
            "https://slack.com/api/chat.postMessage")
          
          echo "Slack response: $response"
          if [ "$(echo "$response" | jq -r '.ok')" != "true" ]; then
            echo "Error: Slack API call failed!" >&2
            exit 1
          fi
