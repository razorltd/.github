name: RZR Status Notify

on:
  workflow_call:
    inputs:
      current_result:
        description: "Optional current workflow result (e.g., success, failure). If omitted, automatically determined by scanning all jobs in the run."
        required: false
        default: ""
        type: string
      name:
        description: "A human-readable name/context, for example Validation run"
        required: true
        type: string
      product:
        description: "The name of the product (e.g. DataQI)"
        required: true
        type: string
      report-mode:
        description: "Notification mode: on-change (default), all, all-failures"
        required: false
        default: "on-change"
        type: string
      slack_channel:
        description: "Slack channel to post to (e.g., #build-status)"
        required: false
        default: ""
        type: string
      artifacts:
        description: "Optional multi-line list of artifacts to link. Format: `[Name](https://url)`"
        required: false
        default: ""
        type: string
      status_client_id:
        description: "GitHub App Client ID"
        required: true
        type: string
    secrets:
      slack_bot_token:
        description: "Slack bot token (required when slack_channel is provided)"
        required: false
      status_app_private_key:
        description: "GitHub App Private Key (.pem file contents)"
        required: true

permissions:
  actions: read
  contents: read
  checks: read

jobs:
  notify:
    name: Status update
    runs-on: ubuntu-latest

    steps:
      - name: Generate status token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ inputs.status_client_id }}
          private-key: ${{ secrets.status_app_private_key }}
          repositories: ".status"

      - name: Process status event
        id: decision
        uses: actions/github-script@v9
        env:
          CURRENT_RESULT: ${{ inputs.current_result }}
          REPORT_MODE: ${{ inputs.report-mode }}
          SLACK_BOT_TOKEN: ${{ secrets.slack_bot_token }}
          SLACK_CHANNEL: ${{ inputs.slack_channel }}
          NAME: ${{ inputs.name }}
          PRODUCT: ${{ inputs.product }}
          ARTIFACTS: ${{ inputs.artifacts }}
          STATUS_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentResultInput = process.env.CURRENT_RESULT;
            const reportMode = process.env.REPORT_MODE;
            const botToken = process.env.SLACK_BOT_TOKEN;
            const channel = process.env.SLACK_CHANNEL;

            const hasSlack = !!(botToken && channel);
            if (channel && !botToken) {
              core.setFailed("Slack bot token is required when 'slack_channel' is provided.");
              return;
            } else if (!hasSlack && botToken) {
              core.info("Slack notifications will be skipped. To enable them, provide 'slack_channel'.");
            }

            const validModes = ['on-change', 'all', 'all-failures'];
            if (!validModes.includes(reportMode)) {
              core.setFailed(`Invalid report-mode: ${reportMode}. Must be one of: ${validModes.join(', ')}`);
              return;
            }

            // Always fetch run jobs to analyze results, using filter 'all' to get previous attempts
            const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: context.runId,
              per_page: 100,
              filter: 'all'
            });
            
            // Deduplicate by job name, keeping the latest attempt
            const jobMap = new Map();
            for (const j of (jobsResponse.data.jobs || [])) {
              const existing = jobMap.get(j.name);
              if (!existing || j.run_attempt > existing.run_attempt) {
                jobMap.set(j.name, j);
              }
            }
            const jobs = Array.from(jobMap.values());

            const passedJobs = jobs.filter(j => j.conclusion === 'success').map(j => j.name);
            const failedJobs = jobs.filter(j => j.conclusion === 'failure' || j.conclusion === 'timed_out').map(j => j.name);
            const skippedJobs = jobs.filter(j => j.conclusion === 'skipped').map(j => j.name);
            const cancelledJobs = jobs.filter(j => j.conclusion === 'cancelled').map(j => j.name);

            let currentResult = currentResultInput;
            if (!currentResult) {
              currentResult = failedJobs.length > 0 ? 'failure' : 'success';
            } else {
              const validResults = ['success', 'failure', 'warning'];
              if (!validResults.includes(currentResult)) {
                core.setFailed(`Invalid current_result: ${currentResult}. Must be one of: ${validResults.join(', ')}`);
                return;
              }
            }

            const currentRun = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id: context.runId
            });

            const workflowSlug = process.env.NAME.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
            const statusToken = process.env.STATUS_TOKEN;
            let previousConclusion = 'unknown';

            if (statusToken) {
              try {
                const statusOctokit = getOctokit(statusToken);
                const path = `${process.env.PRODUCT}/${workflowSlug}.status`;
                const response = await statusOctokit.rest.repos.getContent({
                  owner: owner,
                  repo: '.status',
                  path: path
                });

                if (response.data && response.data.content) {
                  const content = Buffer.from(response.data.content, 'base64').toString('utf8');
                  const parsed = JSON.parse(content);
                  if (typeof parsed.isFailure === 'boolean') {
                    previousConclusion = parsed.isFailure ? 'failure' : 'success';
                  } else {
                    previousConclusion = parsed.status || 'unknown';
                  }
                }
              } catch (e) {
                core.info(`Could not fetch previous status from .status repo: ${e.message}`);
              }
            } else {
              core.info('No statusToken provided, cannot check .status repo for previous conclusion.');
            }

            let notificationType = 'none';
            let statusText = 'recovered';
            let reasoning = '';

            if (currentResult === 'failure') {
              if (reportMode === 'all') {
                notificationType = 'failure';
                reasoning = `Current run failed. Mode is 'all', so notification is triggered.`;
              } else if (reportMode === 'all-failures') {
                notificationType = 'failure';
                reasoning = `Current run failed. Mode is 'all-failures', so notification is triggered.`;
              } else if (reportMode === 'on-change') {
                if (previousConclusion !== 'failure') {
                  notificationType = 'failure';
                  reasoning = `Current run failed, while previous run conclusion was '${previousConclusion}' (state changed to failure). Notification is triggered.`;
                } else {
                  reasoning = `Current run failed, and previous run conclusion was also '${previousConclusion}'. Mode is 'on-change', suppressing duplicate failure notification.`;
                }
              }
            } else if (currentResult === 'warning') {
              if (reportMode === 'all') {
                notificationType = 'warning';
                statusText = 'warned';
                reasoning = `Current run warned. Mode is 'all', so notification is triggered.`;
              } else if (reportMode === 'all-failures') {
                notificationType = 'warning';
                statusText = 'warned';
                reasoning = `Current run warned. Mode is 'all-failures', so notification is triggered.`;
              } else if (reportMode === 'on-change') {
                if (previousConclusion !== 'warning') {
                  notificationType = 'warning';
                  statusText = 'warned';
                  reasoning = `Current run warned, while previous run conclusion was '${previousConclusion}' (state changed to warning). Notification is triggered.`;
                } else {
                  reasoning = `Current run warned, and previous run conclusion was also '${previousConclusion}'. Mode is 'on-change', suppressing duplicate warning notification.`;
                }
              }
            } else if (currentResult === 'success') {
              if (reportMode === 'all') {
                notificationType = 'recovery';
                statusText = previousConclusion === 'failure' ? 'recovered' : 'succeeded';
                reasoning = `Current run succeeded. Previous run conclusion was '${previousConclusion}'. Mode is 'all', so notification is triggered.`;
              } else if (reportMode === 'on-change' || reportMode === 'all-failures') {
                if (previousConclusion === 'failure') {
                  notificationType = 'recovery';
                  reasoning = `Current run succeeded, while previous run failed. Build has recovered. Notification is triggered.`;
                } else {
                  reasoning = `Current run succeeded and previous run conclusion was '${previousConclusion}'. State did not transition from failure. Notification is suppressed.`;
                }
              }
            }

            if (!hasSlack) {
              notificationType = 'none';
            }

            let meaning = '';
            if (previousConclusion === 'failure') {
              if (currentResult === 'success') {
                meaning = 'Build recovered! The previous failure has been resolved.';
              } else if (currentResult === 'warning') {
                meaning = 'Build improved to a warning! The previous failure is gone, but there are warnings.';
              } else {
                meaning = 'Build is still failing. Attention is required to fix the broken jobs.';
              }
            } else if (previousConclusion === 'warning') {
              if (currentResult === 'success') {
                meaning = 'Build recovered! The previous warning has been resolved.';
              } else if (currentResult === 'warning') {
                meaning = 'Build still has warnings. Attention is required to fix the warnings.';
              } else {
                meaning = 'One or more jobs failed, please investigate.';
              }
            } else {
              if (currentResult === 'failure') {
                meaning = 'One or more jobs failed, please investigate.';
              } else if (currentResult === 'warning') {
                meaning = 'One or more jobs warned, please investigate.';
              } else {
                meaning = 'Build is healthy and the jobs are passing.';
              }
            }

            function formatDuration(startedAt, completedAt) {
              if (!startedAt || !completedAt) return '0s';
              const start = new Date(startedAt);
              const end = new Date(completedAt);
              const diffMs = end - start;
              if (isNaN(diffMs) || diffMs < 0) return '0s';
              
              const totalSecs = Math.floor(diffMs / 1000);
              const mins = Math.floor(totalSecs / 60);
              const secs = totalSecs % 60;
              
              if (mins > 0) {
                return `${mins}m ${secs}s`;
              }
              return `${secs}s`;
            }

            const artifactsInput = process.env.ARTIFACTS;
            const parsedArtifacts = [];
            if (artifactsInput) {
              artifactsInput.split('\n').forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;
                const match = trimmed.match(/\[(.*?)\]\((.*?)\)/);
                if (match && match[1] && match[2]) {
                  parsedArtifacts.push({ name: match[1].trim(), url: match[2].trim() });
                }
              });
            }

            // Generate detailed job summary report
            let reportLines = [];
            reportLines.push(`# Workflow Run Job Summary (Run ID: ${context.runId})`);
            reportLines.push(`**Repository:** [${owner}/${repo}](https://github.com/${owner}/${repo})`);
            reportLines.push(`**Triggered by:** ${context.actor}`);
            reportLines.push("");

            if (parsedArtifacts.length > 0) {
              reportLines.push("## Attached Artifacts");
              parsedArtifacts.forEach(art => {
                reportLines.push(`- [${art.name}](${art.url})`);
              });
              reportLines.push("");
            }

            const jobsDetails = [];
            for (const job of jobs) {
              if (job.name.includes('Slack Notification') || job.name === context.job) {
                continue; // Skip the notification job itself
              }
              const duration = formatDuration(job.started_at, job.completed_at);
              const status = (job.conclusion || job.status || 'unknown').toUpperCase();
              
              let emoji = '⚪';
              if (status === 'SUCCESS') emoji = '🟢';
              else if (status === 'FAILURE' || status === 'TIMED_OUT') emoji = '🔴';
              else if (status === 'IN_PROGRESS' || status === 'QUEUED') emoji = '🟡';
              
              reportLines.push(`## Job: [${job.name}](${job.html_url})`);
              reportLines.push(`- **Status:** ${emoji} ${status}`);
              reportLines.push(`- **Duration:** ${duration}`);
              
              let errorInfo = '';
              if (job.conclusion === 'failure' || job.conclusion === 'timed_out') {
                const failedStep = job.steps?.find(s => s.conclusion === 'failure' || s.conclusion === 'timed_out');
                errorInfo = failedStep ? `Failed at step: \`${failedStep.name}\`` : 'Failed (reason unknown)';
                
                try {
                  const annotations = await github.rest.checks.listAnnotations({
                    owner,
                    repo,
                    check_run_id: job.id
                  });
                  if (annotations.data && annotations.data.length > 0) {
                    errorInfo += "\n\n**Annotations:**\n";
                    for (const ann of annotations.data) {
                      errorInfo += `- [${ann.annotation_level}] \`${ann.path || 'unknown'}:${ann.start_line || 0}\` - ${ann.message}\n`;
                    }
                  }
                } catch (err) {
                  // Ignore error fetching annotations
                }
                reportLines.push(`\n**Error Info:**\n${errorInfo}`);
              }
              reportLines.push("");
              
              jobsDetails.push({
                name: job.name,
                status: status,
                duration: duration,
                error_info: errorInfo,
                started_at: job.started_at,
                completed_at: job.completed_at
              });
            }

            const fs = require('fs');
            fs.writeFileSync('job_summary.md', reportLines.join('\n'));

            let failedJobsInline = '';
            if (failedJobs.length > 0) {
              failedJobsInline = `> *Failed Jobs:*\n` + failedJobs.map(name => `> • ${name}`).join('\n') + '\n';
            }

            let jobSummary = `Passed: ${passedJobs.length} | Failed: ${failedJobs.length} | Skipped: ${skippedJobs.length}`;
            if (failedJobs.length > 0) {
              jobSummary += ` (Failed: ${failedJobs.join(', ')})`;
            }
            if (skippedJobs.length > 0) {
              jobSummary += ` (Skipped: ${skippedJobs.join(', ')})`;
            }

            core.info(`Notification Type: ${notificationType}`);
            core.info(`Status Text: ${statusText}`);
            core.info(`Previous Conclusion: ${previousConclusion}`);
            core.info(`Reasoning: ${reasoning}`);
            core.info(`Job Summary: ${jobSummary}`);
            core.info(`Meaning: ${meaning}`);

            core.setOutput('notification_type', notificationType);
            core.setOutput('status_text', statusText);
            core.setOutput('previous_conclusion', previousConclusion);
            core.setOutput('reasoning', reasoning);
            core.setOutput('job_summary', jobSummary);
            core.setOutput('meaning', meaning);
            core.setOutput('failed_jobs_inline', failedJobsInline);
            const dashboardUrl = `https://builds.status.razor.co.uk/${encodeURIComponent(process.env.PRODUCT)}/history/${workflowSlug}?runId=${context.runId}`;
            core.setOutput('dashboard_url', dashboardUrl);



            const runDetails = {
              repo: `${owner}/${repo}`,
              workflow: process.env.NAME || context.workflow,
              run_id: context.runId,
              run_number: context.runNumber,
              run_url: `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`,
              actor: context.actor,
              status: currentResult,
              started_at: currentRun.data.run_started_at || currentRun.data.created_at,
              completed_at: new Date().toISOString(),
              jobs: jobsDetails,
              artifacts: parsedArtifacts
            };
            core.setOutput('run_details_json', JSON.stringify(runDetails));

      - name: Send Slack notification
        if: steps.decision.outputs.notification_type != 'none'
        shell: bash
        env:
          NOTIFICATION_TYPE: ${{ steps.decision.outputs.notification_type }}
          STATUS_TEXT: ${{ steps.decision.outputs.status_text }}
          SLACK_BOT_TOKEN: ${{ secrets.slack_bot_token }}
          SLACK_CHANNEL: ${{ inputs.slack_channel }}
          NAME: ${{ inputs.name }}
          PRODUCT: ${{ inputs.product }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
          FAILED_JOBS_INLINE: ${{ steps.decision.outputs.failed_jobs_inline }}
          MEANING: ${{ steps.decision.outputs.meaning }}
          PREVIOUS_CONCLUSION: ${{ steps.decision.outputs.previous_conclusion }}
          DASHBOARD_URL: ${{ steps.decision.outputs.dashboard_url }}
        run: |
          NL=$'\n'
          if [ "${NOTIFICATION_TYPE}" = "failure" ]; then
            EMOJI="❌"
            ACTION_TEXT="failed"
            JOBS_INLINE="${FAILED_JOBS_INLINE}"
          elif [ "${NOTIFICATION_TYPE}" = "warning" ]; then
            EMOJI="⚠️"
            ACTION_TEXT="warned"
            JOBS_INLINE="${FAILED_JOBS_INLINE}"
          else
            EMOJI="✅"
            ACTION_TEXT="${STATUS_TEXT}"
            JOBS_INLINE=""
          fi
          comment="${EMOJI} *${NAME} ${ACTION_TEXT}*${NL}${NL}> *Product:* ${PRODUCT}${NL}> *Dashboard:* <${DASHBOARD_URL}|View on Razor Status>${NL}> *Repository:* ${REPOSITORY}${NL}> *Workflow:* ${WORKFLOW_NAME}${NL}> *Run:* <${RUN_URL}|${RUN_ID}>${NL}> *Previous State:* ${PREVIOUS_CONCLUSION}${NL}${JOBS_INLINE}> *What this means:* ${MEANING}"

          # Look up channel ID if channel name is provided (starting with #)
          CHANNEL_ID="$SLACK_CHANNEL"
          if [[ "$CHANNEL_ID" == "#"* ]]; then
            CLEAN_NAME="${CHANNEL_ID#\#}"
            echo "Looking up ID for channel $CHANNEL_ID..."
            list_res=$(curl -sS -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              "https://slack.com/api/users.conversations?types=public_channel,private_channel&exclude_members=true&limit=1000")
            
            if [ "$(echo "$list_res" | jq -r '.ok')" = "true" ]; then
              matched_id=$(echo "$list_res" | jq -r --arg name "$CLEAN_NAME" '.channels[] | select(.name == $name) | .id')
              if [ -n "$matched_id" ] && [ "$matched_id" != "null" ]; then
                CHANNEL_ID="$matched_id"
                echo "Found matched Channel ID: $CHANNEL_ID"
              else
                echo "Warning: could not find channel with name $CLEAN_NAME in Slack list. Using original value."
              fi
            else
              echo "Warning: users.conversations failed: $list_res"
            fi
          fi

          # Try uploading the job summary file to Slack V2 API
          if [ -f "job_summary.md" ]; then
            echo "Getting Slack upload URL..."
            res=$(curl -sS -X POST \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -d "filename=job_summary.md" \
              -d "length=$(wc -c < job_summary.md)" \
              https://slack.com/api/files.getUploadURLExternal)
            
            if [ "$(echo "$res" | jq -r '.ok')" = "true" ]; then
              upload_url=$(echo "$res" | jq -r '.upload_url')
              file_id=$(echo "$res" | jq -r '.file_id')
              
              echo "Uploading file content..."
              curl -sS -F "file=@job_summary.md" "$upload_url"
              
              echo "Completing upload..."
              complete_res=$(curl -sS -X POST \
                -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                -H "Content-type: application/json; charset=utf-8" \
                -d "$(jq -n \
                  --arg file_id "$file_id" \
                  --arg channel "$CHANNEL_ID" \
                  --arg comment "$comment" \
                  '{files: [{id: $file_id, title: "job_summary.md"}], channel_id: $channel, initial_comment: $comment}')" \
                https://slack.com/api/files.completeUploadExternal)
              
              echo "Slack response: $complete_res"
              if [ "$(echo "$complete_res" | jq -r '.ok')" = "true" ]; then
                exit 0
              else
                echo "Warning: files.completeUploadExternal failed: $complete_res"
              fi
            else
              echo "Warning: files.getUploadURLExternal failed: $res"
            fi
          fi

          # Fallback: Send message only via chat.postMessage
          echo "Falling back to text-only message..."
          payload=$(jq -n \
            --arg channel "$SLACK_CHANNEL" \
            --arg text "$comment" \
            '{channel: $channel, text: $text}')
          
          response=$(curl -sS -X POST \
            -H 'Content-type: application/json; charset=utf-8' \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            --data "$payload" \
            "https://slack.com/api/chat.postMessage")
          
          echo "Slack response: $response"
          if [ "$(echo "$response" | jq -r '.ok')" != "true" ]; then
            echo "Error: Slack API call failed!" >&2
            exit 1
          fi

      - name: Persist status
        if: always() && steps.decision.conclusion == 'success'
        uses: actions/github-script@v9
        env:
          STATUS_TOKEN: ${{ steps.app-token.outputs.token }}
          PRODUCT: ${{ inputs.product }}
          NAME: ${{ inputs.name }}
          RUN_DETAILS_JSON: ${{ steps.decision.outputs.run_details_json }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const statusToken = process.env.STATUS_TOKEN;
            const product = process.env.PRODUCT;
            const name = process.env.NAME;
            const runDetailsJsonStr = process.env.RUN_DETAILS_JSON;

            if (!statusToken) {
              core.info("No status_token provided, skipping storing status.");
              return;
            }

            const runDetails = JSON.parse(runDetailsJsonStr);
            const runNumber = runDetails.run_number;
            const workflowSlug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

            const owner = context.repo.owner;
            const repoUrl = `https://x-access-token:${statusToken}@github.com/${owner}/.status.git`;
            const cloneDir = path.join(process.cwd(), 'status-repo');

            // Configure git
            await exec.exec('git', ['config', '--global', 'user.name', 'github-actions[bot]']);
            await exec.exec('git', ['config', '--global', 'user.email', 'github-actions[bot]@users.noreply.github.com']);

            // We will try up to 5 times to clone, modify, and push
            const maxRetries = 5;
            let success = false;

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              try {
                core.info(`Attempt ${attempt} to update .status repository...`);
                
                // Clean up cloneDir if it exists
                if (fs.existsSync(cloneDir)) {
                  fs.rmSync(cloneDir, { recursive: true, force: true });
                }
                
                // Clone
                await exec.exec('git', ['clone', '--depth', '1', repoUrl, cloneDir]);
                
                const productDir = path.join(cloneDir, product);
                if (!fs.existsSync(productDir)) {
                  fs.mkdirSync(productDir, { recursive: true });
                }
                
                // 1. Update {{NAME}}.status
                const statusFilePath = path.join(productDir, `${workflowSlug}.status`);
                let existingStatus = {};
                if (fs.existsSync(statusFilePath)) {
                  try {
                    existingStatus = JSON.parse(fs.readFileSync(statusFilePath, 'utf8'));
                  } catch (e) {
                    core.warning(`Failed to parse existing ${workflowSlug}.status: ${e.message}. Starting fresh.`);
                  }
                }
                
                if (existingStatus.runNumber && existingStatus.runNumber > runNumber) {
                  core.info(`Existing runNumber (${existingStatus.runNumber}) is newer than current runNumber (${runNumber}). Skipping update.`);
                  success = true;
                  break;
                }

                const newStatus = {
                  name: name,
                  status: runDetails.status,
                  isFailure: runDetails.status === 'failure',
                  isWarning: runDetails.status === 'warning',
                  runId: runDetails.run_id,
                  runNumber: runNumber,
                  timestamp: runDetails.started_at,
                  repo: runDetails.repo,
                  URL: runDetails.run_url,
                  artifacts: runDetails.artifacts || []
                };
                fs.writeFileSync(statusFilePath, JSON.stringify(newStatus, null, 2));
                core.info(`Updated ${workflowSlug}.status`);
                
                // 2. Write {{NAME}}.report
                const reportFilePath = path.join(productDir, `${workflowSlug}.report`);
                
                let reportContent = `# ${name}\n\n`;
                reportContent += `**Product:** ${product}\n`;
                reportContent += `**Repository:** ${runDetails.repo}\n`;
                reportContent += `**Workflow:** ${runDetails.workflow}\n`;
                reportContent += `**Run:** [${runDetails.run_id}](${runDetails.run_url})\n`;
                reportContent += `**Status:** ${runDetails.status}\n\n`;
                
                const jobSummaryPath = path.join(process.cwd(), 'job_summary.md');
                if (fs.existsSync(jobSummaryPath)) {
                  reportContent += fs.readFileSync(jobSummaryPath, 'utf8');
                } else if (fs.existsSync('job_summary.md')) {
                  reportContent += fs.readFileSync('job_summary.md', 'utf8');
                } else {
                  reportContent += "```json\n" + JSON.stringify(runDetails, null, 2) + "\n```\n";
                }
                
                fs.writeFileSync(reportFilePath, reportContent);
                core.info(`Wrote report to ${workflowSlug}.report`);
                
                // Commit and push
                const options = { cwd: cloneDir };
                await exec.exec('git', ['add', '.'], options);
                
                // Check if there are any changes to commit
                let statusOutput = '';
                const statusOptions = {
                  ...options,
                  listeners: {
                    stdout: (data) => { statusOutput += data.toString(); }
                  }
                };
                await exec.exec('git', ['status', '--porcelain'], statusOptions);
                
                if (statusOutput.trim() === '') {
                  core.info("No changes to commit. .status repo is already up to date.");
                  success = true;
                  break;
                }
                
                await exec.exec('git', ['commit', '-m', `Update status for ${product}/${name} (Run #${runNumber})`], options);
                await exec.exec('git', ['push'], options);
                
                core.info("Successfully pushed changes to .status repository!");
                success = true;
                break;
              } catch (err) {
                core.warning(`Attempt ${attempt} failed: ${err.message}`);
                if (attempt < maxRetries) {
                  const delay = Math.floor(Math.random() * 3000) + 1000; // 1-4 seconds delay
                  core.info(`Waiting ${delay}ms before retrying...`);
                  await new Promise(resolve => setTimeout(resolve, delay));
                } else {
                  core.setFailed(`Failed to update .status repository after ${maxRetries} attempts.`);
                }
              }
            }
