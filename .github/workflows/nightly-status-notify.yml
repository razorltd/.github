name: Nightly Status Notify

on:
  workflow_call:
    inputs:
      watched_workflow_name:
        description: "Name of the workflow whose status should be checked"
        required: true
        type: string
      current_result:
        description: "Current workflow result from the caller, usually needs.<job>.result"
        required: true
        type: string
      mention_on_failure:
        description: "Optional Slack mention, for example <!subteam^ID> or @here"
        required: false
        default: ""
        type: string
      channel_context:
        description: "Optional human-readable context, for example Nightly builds"
        required: false
        default: "Nightly build"
        type: string
    secrets:
      slack_webhook_url:
        required: true

permissions:
  actions: read
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Determine whether Slack notification is required
        id: decision
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowName = core.getInput('watched_workflow_name');
            const currentResult = core.getInput('current_result');

            const workflows = await github.rest.actions.listRepoWorkflows({
              owner,
              repo
            });

            const workflow = workflows.data.workflows.find(w => w.name === workflowName);

            if (!workflow) {
              core.setFailed(`Could not find workflow named "${workflowName}" in ${owner}/${repo}`);
              return;
            }

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflow.id,
              status: 'completed',
              per_page: 10
            });

            const currentRunId = context.runId;

            const previousRun = runs.data.workflow_runs.find(r => r.id !== currentRunId);
            const previousConclusion = previousRun?.conclusion || 'unknown';

            let notificationType = 'none';

            if (currentResult === 'failure' && previousConclusion !== 'failure') {
              notificationType = 'failure';
            }

            if (currentResult === 'success' && previousConclusion === 'failure') {
              notificationType = 'recovery';
            }

            core.setOutput('notification_type', notificationType);
            core.setOutput('previous_conclusion', previousConclusion);

      - name: Send Slack failure notification
        if: steps.decision.outputs.notification_type == 'failure'
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
          MENTION: ${{ inputs.mention_on_failure }}
          CHANNEL_CONTEXT: ${{ inputs.channel_context }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_NAME: ${{ inputs.watched_workflow_name }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -n \
            --arg text "❌ ${CHANNEL_CONTEXT} failed\n${MENTION}\nRepository: ${REPOSITORY}\nWorkflow: ${WORKFLOW_NAME}\nRun: ${RUN_URL}" \
            '{text: $text}')

          curl -sS -X POST \
            -H 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

      - name: Send Slack recovery notification
        if: steps.decision.outputs.notification_type == 'recovery'
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
          CHANNEL_CONTEXT: ${{ inputs.channel_context }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_NAME: ${{ inputs.watched_workflow_name }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -n \
            --arg text "✅ ${CHANNEL_CONTEXT} recovered\nRepository: ${REPOSITORY}\nWorkflow: ${WORKFLOW_NAME}\nRun: ${RUN_URL}" \
            '{text: $text}')

          curl -sS -X POST \
            -H 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"
