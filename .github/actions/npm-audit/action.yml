name: 'NPM Audit'
description: 'Runs npm audit and outputs structured vulnerability counts, boolean flags, and lists of affected packages.'
inputs:
  path:
    description: 'Directory path to run npm audit in'
    required: false
    default: '.'
outputs:
  hasCritical:
    description: 'Whether critical vulnerabilities were found (true/false)'
    value: ${{ steps.parse-audit.outputs.hasCritical }}
  hasHigh:
    description: 'Whether high vulnerabilities were found (true/false)'
    value: ${{ steps.parse-audit.outputs.hasHigh }}
  hasModerate:
    description: 'Whether moderate vulnerabilities were found (true/false)'
    value: ${{ steps.parse-audit.outputs.hasModerate }}
  hasLow:
    description: 'Whether low vulnerabilities were found (true/false)'
    value: ${{ steps.parse-audit.outputs.hasLow }}
  criticalCount:
    description: 'Count of critical vulnerabilities'
    value: ${{ steps.parse-audit.outputs.criticalCount }}
  highCount:
    description: 'Count of high vulnerabilities'
    value: ${{ steps.parse-audit.outputs.highCount }}
  moderateCount:
    description: 'Count of moderate vulnerabilities'
    value: ${{ steps.parse-audit.outputs.moderateCount }}
  lowCount:
    description: 'Count of low vulnerabilities'
    value: ${{ steps.parse-audit.outputs.lowCount }}
  criticalVulnerabilities:
    description: 'List of critical vulnerability packages (JSON array)'
    value: ${{ steps.parse-audit.outputs.criticalVulnerabilities }}
  highVulnerabilities:
    description: 'List of high vulnerability packages (JSON array)'
    value: ${{ steps.parse-audit.outputs.highVulnerabilities }}
  moderateVulnerabilities:
    description: 'List of moderate vulnerability packages (JSON array)'
    value: ${{ steps.parse-audit.outputs.moderateVulnerabilities }}
  lowVulnerabilities:
    description: 'List of low vulnerability packages (JSON array)'
    value: ${{ steps.parse-audit.outputs.lowVulnerabilities }}
  vulnerabilitiesArtifacts:
    description: 'A multi-line markdown link list of found vulnerabilities formatted for the status notifier.'
    value: ${{ steps.parse-audit.outputs.vulnerabilitiesArtifacts }}

runs:
  using: 'composite'
  steps:
    - name: Run audit and parse
      id: parse-audit
      shell: bash
      working-directory: ${{ inputs.path }}
      run: |
        echo "Running npm audit in $(pwd)..."
        # Run npm audit --json, ignoring its non-zero exit code on vulnerabilities
        AUDIT_OUTPUT=$(npm audit --json || true)
        
        # Verify JSON contains .metadata.vulnerabilities
        if ! echo "$AUDIT_OUTPUT" | jq -e '.metadata.vulnerabilities' >/dev/null; then
          echo "Error: npm audit failed or returned invalid JSON:"
          echo "$AUDIT_OUTPUT"
          exit 1
        fi

        # Extract counts
        CRITICAL_COUNT=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.critical // 0')
        HIGH_COUNT=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.high // 0')
        MODERATE_COUNT=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.moderate // 0')
        LOW_COUNT=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.low // 0')

        # Determine bool flags
        HAS_CRITICAL="false"; [ "$CRITICAL_COUNT" -gt 0 ] && HAS_CRITICAL="true"
        HAS_HIGH="false"; [ "$HIGH_COUNT" -gt 0 ] && HAS_HIGH="true"
        HAS_MODERATE="false"; [ "$MODERATE_COUNT" -gt 0 ] && HAS_MODERATE="true"
        HAS_LOW="false"; [ "$LOW_COUNT" -gt 0 ] && HAS_LOW="true"

        # Extract package lists as unique arrays of names
        CRITICAL_LIST=$(echo "$AUDIT_OUTPUT" | jq -c '[.vulnerabilities[]? | select(.severity == "critical") | .name] | unique // []')
        HIGH_LIST=$(echo "$AUDIT_OUTPUT" | jq -c '[.vulnerabilities[]? | select(.severity == "high") | .name] | unique // []')
        MODERATE_LIST=$(echo "$AUDIT_OUTPUT" | jq -c '[.vulnerabilities[]? | select(.severity == "moderate") | .name] | unique // []')
        LOW_LIST=$(echo "$AUDIT_OUTPUT" | jq -c '[.vulnerabilities[]? | select(.severity == "low") | .name] | unique // []')

        # Construct vulnerabilities artifacts string formatted as markdown links
        VULN_ARTIFACTS=$(echo "$AUDIT_OUTPUT" | jq -r '[.vulnerabilities[]? | "[Vulnerability (\(.severity | ascii_upcase)): \(.name)](https://npmjs.com/package/\(.name))"] | unique | .[]' || true)

        # Output variables
        echo "hasCritical=$HAS_CRITICAL" >> "$GITHUB_OUTPUT"
        echo "hasHigh=$HAS_HIGH" >> "$GITHUB_OUTPUT"
        echo "hasModerate=$HAS_MODERATE" >> "$GITHUB_OUTPUT"
        echo "hasLow=$HAS_LOW" >> "$GITHUB_OUTPUT"

        echo "criticalCount=$CRITICAL_COUNT" >> "$GITHUB_OUTPUT"
        echo "highCount=$HIGH_COUNT" >> "$GITHUB_OUTPUT"
        echo "moderateCount=$MODERATE_COUNT" >> "$GITHUB_OUTPUT"
        echo "lowCount=$LOW_COUNT" >> "$GITHUB_OUTPUT"

        echo "criticalVulnerabilities=$CRITICAL_LIST" >> "$GITHUB_OUTPUT"
        echo "highVulnerabilities=$HIGH_LIST" >> "$GITHUB_OUTPUT"
        echo "moderateVulnerabilities=$MODERATE_LIST" >> "$GITHUB_OUTPUT"
        echo "lowVulnerabilities=$LOW_LIST" >> "$GITHUB_OUTPUT"

        echo "vulnerabilitiesArtifacts<<EOF" >> "$GITHUB_OUTPUT"
        echo "$VULN_ARTIFACTS" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

        # Print debug info to job log
        echo "Vulnerability check finished:"
        echo "Critical: $CRITICAL_COUNT (Vulnerable packages: $CRITICAL_LIST)"
        echo "High: $HIGH_COUNT (Vulnerable packages: $HIGH_LIST)"
        echo "Moderate: $MODERATE_COUNT (Vulnerable packages: $MODERATE_LIST)"
        echo "Low: $LOW_COUNT (Vulnerable packages: $LOW_LIST)"
        echo "Artifacts string:"
        echo "$VULN_ARTIFACTS"
